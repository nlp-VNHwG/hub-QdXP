      - remote_url
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 50
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: "\U0001F44B 欢迎使用意图识别+RAG问答系统！\n\n我可以回答以下类型的问题：\n• \U0001F916\
      \ **机器学习相关问题** - 将检索机器学习知识库\n• \U0001F9E0 **大模型相关问题** - 将检索大模型知识库  \n• \U0001F4AC\
      \ **其他通用问题** - 将直接由AI回答\n\n请直接输入您的问题，我会自动识别意图并给出最佳回答。\n"
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 什么是监督学习？
    - Transformer架构的原理是什么？
    - 今天天气怎么样？
    suggested_questions_after_answer:
      enabled: true
    text_to_speech:
      enabled: false
      language: ''
      voice: ''

            temperature: 0.1
          mode: chat
          name: qwen3.5-plus
          provider: langgenius/tongyi/tongyi
        prompt_template:
        - id: intent_system_prompt
          role: system
          text: '你是一个意图识别专家。请分析用户的问题，判断其属于以下哪一类意图：


            【意图1: 通用问题】

            - 与机器学习、大模型无关的日常问题

            - 问候、闲聊、天气、时间等通用话题

            - 其他技术领域的问题（如前端开发、数据库等）

            - 示例："今天天气怎么样"、"你好"、"推荐一本书"


            【意图2: 机器学习问题】

            - 监督学习、无监督学习、强化学习相关问题

            - 算法原理（如决策树、SVM、神经网络等）

            - 模型训练、评估、优化相关问题

            - 特征工程、数据预处理相关问题

            - 示例："什么是随机森林"、"如何处理过拟合"、"解释梯度下降"


            【意图3: 大模型问题】

            - Transformer架构、注意力机制相关问题

            - GPT、BERT等大模型原理和应用

            - 提示工程、RAG、Agent技术相关问题

            - 模型微调、量化、部署相关问题

            - 示例："Transformer的工作原理"、"什么是RAG"、"如何进行提示工程"


            请只输出意图编号（1、2或3），不要输出任何解释。

            '
        - id: intent_user_prompt
          role: user
          text: 用户问题：{{#sys.query#}}
        selected: false
        title: 意图识别
